name: "app-preflight"
description: "Scan an iOS/Android project for App Store & Play rejection reasons."
branding:
  icon: "check-circle"
  color: "blue"

inputs:
  path:
    description: "Path to the project root to scan."
    required: false
    default: "."
  fail-on:
    description: "Fail the job at this severity or above: info | warning | error."
    required: false
    default: "error"
  format:
    description: "Output format: pretty | json."
    required: false
    default: "pretty"

runs:
  using: "composite"
  steps:
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Build preflight
      shell: bash
      run: cargo install --path "${{ github.action_path }}/crates/cli" --root "${{ runner.temp }}/preflight"
    - name: Run preflight
      shell: bash
      run: |
        "${{ runner.temp }}/preflight/bin/preflight" check "${{ inputs.path }}" \
          --format "${{ inputs.format }}" \
          --fail-on "${{ inputs.fail-on }}"
