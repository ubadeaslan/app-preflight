name: release

# Tag a release (e.g. `git tag v0.1.0 && git push --tags`) to build binaries for
# all supported platforms and attach them to a GitHub Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} -p preflight-cli

      - name: Package
        shell: bash
        run: |
          dist="preflight-${{ matrix.target }}"
          mkdir "$dist"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/preflight.exe" "$dist/"
          else
            cp "target/${{ matrix.target }}/release/preflight" "$dist/"
          fi
          cp README.md LICENSE-MIT LICENSE-APACHE "$dist/"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "$dist.zip" "$dist" >/dev/null
            asset="$dist.zip"
          else
            tar czf "$dist.tar.gz" "$dist"
            asset="$dist.tar.gz"
          fi
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - name: Checksum
        shell: bash
        run: |
          if command -v sha256sum >/dev/null; then
            sha256sum "$ASSET" > "$ASSET.sha256"
          else
            shasum -a 256 "$ASSET" > "$ASSET.sha256"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
