# cargo-deny configuration. Run `cargo deny check`.

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Permissive licenses acceptable for dependencies of a dual MIT/Apache project.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    # webpki-roots (ureq'in kök sertifika deposu) — veri lisansı, izinli/permissive.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
